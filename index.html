function uid(){let id=localStorage.getItem('tl-uid');if(!id){id='chris-'+Math.random().toString(36).slice(2,10);localStorage.setItem('tl-uid',id);}return id;}
const fmt=iso=>new Date(iso).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
function calcWeek(sd){if(!sd)return 1;const diff=new Date()-new Date(sd);return Math.max(1,Math.min(12,Math.floor(diff/(1000*60*60*24*7))+1));}
function getPrevSession(hist,type){return hist.filter(s=>s.type===type)[0]||null;}
function getPrevExData(prev,secTitle,exName){
  if(!prev?.data?.sections)return null;
  for(const sec of prev.data.sections){if(sec.title===secTitle){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(ex.name===exName){const ds=(ex.sets||[]).filter(s=>s.weight||s.reps);if(ds.length)return ds;}}}}}
  return null;
}
function canProgress(hist,type,secTitle,exName,repsStr){
  const sessions=hist.filter(s=>s.type===type).slice(0,2);
  if(sessions.length<2)return false;
  const top=parseInt((repsStr||'').split('-').pop());
  if(isNaN(top))return false;
  return sessions.every(session=>{
    if(!session.data?.sections)return false;
    for(const sec of session.data.sections){if(sec.title===secTitle){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(ex.name===exName){const sets=ex.sets||[];return sets.length>0&&sets.every(s=>s.done&&parseInt(s.reps)>=top);}}}}}
    return false;
  });
}
function getPersonalBest(hist,exName){
  let best=null;let bestDate=null;
  for(const session of hist){if(!session.data?.sections)continue;for(const sec of session.data.sections){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(ex.name===exName){for(const s of ex.sets||[]){const w=parseFloat(s.weight);const r=parseInt(s.reps);if(w&&r&&s.done){if(!best||w>best.weight||(w===best.weight&&r>best.reps)){best={weight:w,reps:r};bestDate=session.session_date;}}}}}}};}
  return best?{...best,date:bestDate}:null;
}
function getLastLogged(hist,exName){
  for(const session of hist){if(!session.data?.sections)continue;for(const sec of session.data.sections){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(ex.name===exName){const ds=(ex.sets||[]).filter(s=>s.weight&&s.reps&&s.done);if(ds.length)return{date:session.session_date,sets:ds,sessionType:session.type,week:session.week};}}}};}}

// Build library
function buildLibrary(){
  const lib=[];const seen=new Set();
  for(const [sessionName,plan] of Object.entries(PLAN)){
    if(!plan.sections)continue;
    for(const sec of plan.sections){
      for(const ss of sec.supersets||[]){
        for(const ex of ss.exercises||[]){
          if(!seen.has(ex.name)){
            seen.add(ex.name);
            const coaching=COACHING[ex.name]||{};
            lib.push({name:ex.name,sets:ex.sets,reps:ex.reps,category:coaching.category||sec.title,muscle:coaching.muscle||'',sessions:[],tips:coaching.tips||[]});
          }
          const entry=lib.find(e=>e.name===ex.name);
          if(entry&&!entry.sessions.includes(sessionName))entry.sessions.push(sessionName);
        }
      }
    }
  }
  // Swim warm-up
  for(const ex of SWU_EX){
    if(!seen.has(ex.name)){
      seen.add(ex.name);
      const coaching=COACHING[ex.name]||{};
      lib.push({name:ex.name,sets:ex.sets,reps:ex.reps,category:'Swim Warm-Up',muscle:ex.muscle||'',sessions:['Swim'],tips:coaching.tips||[]});
    }
  }
  return lib.sort((a,b)=>a.name.localeCompare(b.name));
}

function Timer({duration,onDone}){
  const[rem,setRem]=useState(duration);const[active,setActive]=useState(true);
  useEffect(()=>{if(!active)return;if(rem<=0){onDone();return;}const t=setTimeout(()=>setRem(r=>r-1),1000);return()=>clearTimeout(t);},[rem,active]);
  const r=26,circ=2*Math.PI*r,c=rem>duration*0.5?G:rem>duration*0.25?O:R;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'14px 0',background:'#0A1628',borderRadius:12,border:`1px solid ${c}44`,margin:'10px 0'}}>
      <div style={{color:'#475569',fontSize:11,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Rest Timer</div>
      <div style={{position:'relative',width:66,height:66}}>
        <svg width="66" height="66" style={{transform:'rotate(-90deg)'}}>
          <circle cx="33" cy="33" r={r} fill="none" stroke="#1E2D40" strokeWidth="5"/>
          <circle cx="33" cy="33" r={r} fill="none" stroke={c} strokeWidth="5" strokeDasharray={`${circ*(rem/duration)} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray 1s linear,stroke 0.3s'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{color:c,fontSize:18,fontFamily:'monospace',fontWeight:700}}>{rem}</span>
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:10}}>
        <button onClick={()=>setActive(a=>!a)} style={{background:'none',border:`1px solid ${c}44`,borderRadius:6,color:c,padding:'4px 12px',cursor:'pointer',fontSize:12}}>{active?'Pause':'Resume'}</button>
        <button onClick={onDone} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:6,color:'#475569',padding:'4px 12px',cursor:'pointer',fontSize:12}}>Skip</button>
      </div>
    </div>
  );
}

  const done=sets.filter(s=>s.done).length;
  const complete=done===sets.length&&sets.length>0;
  const hset=(i,val)=>{
    const s=[...sets];const p=s[i];s[i]=val;
    if(i===0&&!p.done&&val.done&&val.weight&&val.reps){for(let j=1;j<s.length;j++){if(!s[j].weight&&!s[j].reps)s[j]={...s[j],weight:val.weight,reps:val.reps};}}
    onChange({...data,sets:s});
  };
  const isUpper=/(press|curl|fly|row|pulldown|pull-up|chop|bird)/i.test(exDef.name);
  const jump=isUpper?'2.5':'5';
  return(
    <div className="fi" style={{background:'#070E1A',border:`1px solid ${progress?G+'99':complete?c+'55':'#1E2D40'}`,borderRadius:8,padding:'10px 12px',marginBottom:8}}>

function SSBlock({ss,ssData,onChange,color,restDur,secTitle,hist,sessionType}){

  const tot=ss.exercises.reduce((a,ex)=>a+(ex.sets||1),0);

function RevPanel({session,hist,color}){
  const[st,setSt]=useState('idle');const[fb,setFb]=useState('');
  const sum=s=>{
    const ig=['Gym A','Gym B','Gym C'].includes(s.type);
    let t=`Session: ${s.type} | Week: ${s.week}\n`;
    if(s.data?.workoutNotes)t+=`Notes: ${s.data.workoutNotes}\n`;
    t+='\n';const d=s.data||{};
    if(ig){(d.sections||[]).forEach(sec=>{t+=`[${sec.title}]\n`;(sec.supersets||[]).forEach(ss=>{t+=`${ss.label}:\n`;(ss.exercises||[]).forEach(ex=>{t+=`${ex.name}\n`;(ex.sets||[]).forEach((s2,i)=>{if(s2.weight||s2.reps)t+=`  Set ${i+1}: ${s2.weight||'?'}kg x ${s2.reps||'?'}${s2.done?' done':''}\n`;});if(ex.rpe)t+=`  RPE: ${ex.rpe}\n`;});});});}
    else if(s.type==='Run'){t+=`Distance: ${d.distance||'?'}km | Duration: ${d.duration||'?'}min | Avg HR: ${d.avgHR||'?'}bpm\nPace: ${d.avgPace||'?'}/km | Zone: ${d.zone||'?'} | Feel: ${d.feel||'?'}\n`;}
    else if(s.type==='Swim'){t+=`Distance: ${d.distance||'?'}m | Duration: ${d.duration||'?'}min | Shoulder: ${d.shoulder||'?'}\n`;}
    else if(s.type==='Bike'){t+=`Duration: ${d.duration||'?'}min | Avg HR: ${d.avgHR||'?'}bpm | Zone: ${d.zone||'?'} | Legs: ${d.legs||'?'}\n`;}
    return t;
  };
  const go=async()=>{
    setSt('loading');
    try{
      const s=sum(session);
      const prev=(hist||[]).filter(h=>h.type===session.type&&h.id!==session.id).slice(0,3);
      const pt=prev.length?'\nPREVIOUS SESSIONS:\n'+prev.map(sum).join('\n'):'';
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`You are an expert personal trainer reviewing workout data for Chris, 35yo, 79kg, London. 12-week hypertrophy plan. Right shoulder surgery Nov 2024 — 20-45deg ROM deficit, no overhead pressing. Week ${session.week} of 12. Progression: hit top rep range on all sets across 2 consecutive sessions then increase weight (2.5kg upper, 5kg lower). Target RPE 6-8. Provide: 1) Brief overall assessment (2-3 sentences) 2) Exercise highlights — flag weights to progress, RPE concerns, form notes 3) Shoulder check if gym session 4) One specific action for next session. Use exact weights. Under 350 words. Use **bold** headers.`,messages:[{role:'user',content:`SESSION:\n${s}${pt}`}]})});
      const d=await res.json();
      setFb(d.content?.[0]?.text||'Unable to generate feedback.');setSt('done');
    }catch(e){setFb('Error: '+e.message);setSt('error');}
  };
  const render=t=>t.split('\n').map((l,i)=>{
    if(!l.trim())return <div key={i} style={{height:6}}/>;
    const p=l.split(/\*\*(.*?)\*\*/g);
    return <div key={i} style={{marginBottom:4,lineHeight:1.6}}>{p.map((x,j)=>j%2===1?<span key={j} style={{color:'#E2E8F0',fontWeight:700,fontSize:13}}>{x}</span>:<span key={j} style={{color:'#94A3B8',fontSize:13}}>{x}</span>)}</div>;
  });
  return(
    <div style={{marginTop:16}}>
      {st==='idle'&&<button onClick={go} style={{width:'100%',padding:'13px',background:`linear-gradient(135deg,${color}44,${color}22)`,border:`1px solid ${color}`,borderRadius:10,color,fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><span>🤖</span> Get Claude Feedback</button>}
      {st==='loading'&&<div style={{background:'#0D1B2E',border:`1px solid ${color}44`,borderRadius:10,padding:'20px',textAlign:'center'}}><div style={{color,fontSize:13,marginBottom:10}}>Analysing your session...</div><div style={{display:'flex',justifyContent:'center',gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:color,animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}</div></div>}
      {(st==='done'||st==='error')&&<div style={{background:'#0D1B2E',border:`1px solid ${color}44`,borderRadius:10,padding:'16px'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,paddingBottom:10,borderBottom:'1px solid #1E2D40'}}><span style={{color,fontSize:13,fontWeight:700}}>Claude Feedback</span><button onClick={()=>setSt('idle')} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:4,color:'#475569',padding:'3px 8px',cursor:'pointer',fontSize:11}}>Refresh</button></div>{render(fb)}</div>}
    </div>
  );
}

  const[atype,setAtype]=useState(null);
  const[week,setWeek]=useState(1);
  const[startDate,setStartDate]=useState('');
  const[showDP,setShowDP]=useState(false);
  const[hist,setHist]=useState([]);
  const[gdata,setGdata]=useState({});
  const[cdata,setCdata]=useState({});
  const[wnotes,setWnotes]=useState('');
  const[sphase,setSphase]=useState(0);
  const[restDur,setRestDur]=useState(90);
  const[done2,setDone2]=useState(null);
  const[view,setView]=useState(null);
  const[saving,setSaving]=useState(false);
  const[loaded,setLoaded]=useState(false);
  const userId=uid();
  const asr=useRef(null);

  useEffect(()=>{
    (async()=>{
      try{
        const sd=localStorage.getItem('tl-start');
        if(sd){setStartDate(sd);setWeek(calcWeek(sd));}
        const rows=await db('GET',`/sessions?user_id=eq.${userId}&order=session_date.desc`);
        if(rows?.length)setHist(rows);
        const drafts=await db('GET',`/drafts?user_id=eq.${userId}`);
        if(drafts?.length){
          const dr=drafts[0];setAtype(dr.type);
          const d=dr.data||{};setGdata(d.gymData||{});setCdata(d.cardioData||{});
          setWnotes(d.workoutNotes||'');setSphase(d.swimPhase||0);setScreen('log');
        }
      }catch(e){console.error(e);}
      setLoaded(true);
    })();
  },[]);

  const applyStart=date=>{setStartDate(date);localStorage.setItem('tl-start',date);setWeek(calcWeek(date));setShowDP(false);};
  const saveDraft=useCallback(async(type,w,data)=>{if(!type)return;try{await db('POST','/drafts?on_conflict=user_id',{user_id:userId,type,week:w,data,updated_at:new Date().toISOString()});}catch{}},[userId]);
  useEffect(()=>{if(atype&&screen==='log'){if(asr.current)clearTimeout(asr.current);asr.current=setTimeout(()=>saveDraft(atype,week,{gymData:gdata,cardioData:cdata,workoutNotes:wnotes,swimPhase:sphase}),800);}},[gdata,cdata,wnotes,sphase]);
  const delDraft=async()=>{try{await db('DELETE',`/drafts?user_id=eq.${userId}`);}catch{}};
  const startSess=type=>{setAtype(type);setGdata({});setCdata({});setWnotes('');setScreen('log');};
  const hgc=(si,ssi,ei,val)=>setGdata(d=>({...d,[si]:{...(d[si]||{}),[ssi]:{...(d[si]?.[ssi]||{}),[ei]:val}}}));

  const finish=async()=>{
    const ig=['Gym A','Gym B','Gym C'].includes(atype);
    const plan=PLAN[atype];let data={workoutNotes:wnotes};
    if(ig){data.sections=plan.sections.map((sec,si)=>({title:sec.title,supersets:sec.supersets.map((ss,ssi)=>({label:ss.label,exercises:ss.exercises.map((ex,ei)=>({name:ex.name,...(gdata[si]?.[ssi]?.[ei]||{})}))}))}));}
    else{data={...cdata,workoutNotes:wnotes};}
    const session={id:Date.now(),user_id:userId,type:atype,session_date:new Date().toISOString(),week,data};
    setHist(h=>[session,...h]);setSaving(true);
    try{await db('POST','/sessions',session);}catch(e){console.error(e);}
    await delDraft();setSaving(false);setDone2(session);setScreen('review');setAtype(null);
  };

  const plan=atype?PLAN[atype]:null;
  const col=plan?.color||A;
  const ig=atype&&['Gym A','Gym B','Gym C'].includes(atype);
  const dtw=hist.filter(s=>s.week===week).map(s=>s.type);
  const rc=done2?PLAN[done2.type]?.color||A:A;
  const navScreen=screen==='log'||screen==='review'?'home':screen;

  if(!loaded)return(
    <div style={{background:'#070E1A',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10}}>
      <div style={{display:'flex',gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:A,animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}</div>
      <div style={{color:'#475569',fontSize:12}}>Loading Training Log...</div>
    </div>
  );

  return(
    <div style={{background:'#070E1A',minHeight:'100vh',color:'#E2E8F0',maxWidth:520,margin:'0 auto',paddingBottom:80}}>

      {/* HEADER */}
      <div style={{padding:'20px 20px 0',background:'linear-gradient(180deg,#0A1628 0%,transparent 100%)',position:'sticky',top:0,zIndex:50,backdropFilter:'blur(8px)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{color:A,fontSize:10,fontFamily:'monospace',letterSpacing:2,textTransform:'uppercase',marginBottom:2}}>12-Week Plan</div>
            <div style={{fontSize:21,fontWeight:700,letterSpacing:-0.5}}>Training Log</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{color:'#475569',fontSize:10,marginBottom:3}}>WEEK</div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <button onClick={()=>setWeek(w=>Math.max(1,w-1))} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:4,color:'#475569',width:24,height:24,cursor:'pointer',fontSize:16}}>‹</button>
              <button onClick={()=>setShowDP(v=>!v)} style={{background:'none',border:'none',cursor:'pointer',padding:0,textAlign:'center'}}>
                <div style={{color:A,fontSize:22,fontFamily:'monospace',fontWeight:700,minWidth:28}}>{week}</div>
                <div style={{color:'#1E3A5F',fontSize:8}}>{startDate?'auto':'set date'}</div>
              </button>
              <button onClick={()=>setWeek(w=>Math.min(12,w+1))} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:4,color:'#475569',width:24,height:24,cursor:'pointer',fontSize:16}}>›</button>
            </div>
          </div>
        </div>
        {showDP&&(
          <div className="fi" style={{background:'#0D1B2E',border:`1px solid ${A}33`,borderRadius:10,padding:'12px 14px',marginTop:10}}>
            <div style={{color:'#94A3B8',fontSize:12,marginBottom:8}}>Set plan start date — week auto-calculates</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input type="date" value={startDate} onChange={e=>applyStart(e.target.value)} style={{flex:1,background:'#070E1A',border:'1px solid #1E3A5F',borderRadius:6,color:A,padding:'7px 10px',fontSize:13,outline:'none'}}/>
              <button onClick={()=>setShowDP(false)} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:6,color:'#475569',padding:'7px 12px',cursor:'pointer',fontSize:12}}>Done</button>
            </div>
            {startDate&&<div style={{color:'#475569',fontSize:11,marginTop:6}}>Currently Week {calcWeek(startDate)} of 12</div>}
          </div>
        )}
        <div style={{display:'flex',gap:0,marginTop:12,borderBottom:'1px solid #1E2D40'}}>
          {[['home','Sessions'],['exercises','Exercises'],['history','History']].map(([s,label])=>(
            <button key={s} onClick={()=>{setScreen(s);setAtype(null);}}
              style={{padding:'8px 0',background:'none',border:'none',color:navScreen===s?A:'#475569',fontSize:12,fontWeight:navScreen===s?600:400,cursor:'pointer',borderBottom:navScreen===s?`2px solid ${A}`:'2px solid transparent',flex:1,textAlign:'center'}}>
              {label}
            </button>
          ))}
          {saving&&<span style={{color:'#334155',fontSize:10,alignSelf:'center',paddingRight:8}}>saving...</span>}
          {screen==='log'&&!saving&&<span style={{color:'#1E3A5F',fontSize:10,alignSelf:'center',paddingRight:8}}>auto-saving</span>}
        </div>
      </div>

      {/* HOME */}
      {screen==='home'&&(
        <div style={{padding:'16px 20px 0'}}>
          <div style={{marginBottom:16}}>
            <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Week {week} Progress</div>
            <div style={{display:'flex',gap:5}}>
              {DAYS.map(day=>{const exp=DMAP[day];const dn=dtw.includes(exp);const rest=exp==='Rest';return(
                <div key={day} style={{flex:1,textAlign:'center'}}>
                  <div style={{fontSize:9,color:'#334155',marginBottom:3,fontFamily:'monospace'}}>{day}</div>
                  <div style={{height:30,borderRadius:6,background:rest?'#0D1B2E':dn?G+'33':'#0D1B2E',border:`1px solid ${rest?'#1E2D40':dn?G+'88':'#1E3A5F'}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:9,color:rest?'#1E3A5F':dn?G:'#334155',fontWeight:600}}>{rest?'–':dn?'✓':exp?.replace('Gym ','')}</span>
                  </div>
                </div>
              );})}
            </div>
          </div>
          <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1.5,marginBottom:10}}>Start Session</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            {Object.entries(PLAN).map(([name,p])=>{const dn=dtw.includes(name);return(
              <button key={name} onClick={()=>startSess(name)} style={{padding:'14px 12px',background:'#0A1628',border:`1px solid ${dn?p.color+'88':p.color+'44'}`,borderRadius:12,cursor:'pointer',textAlign:'left',position:'relative',overflow:'hidden'}}>
                {dn&&<div style={{position:'absolute',top:8,right:8,width:7,height:7,background:G,borderRadius:'50%'}}/>}
                <div style={{fontSize:20,fontFamily:'monospace',fontWeight:900,color:p.color,marginBottom:3,lineHeight:1}}>{p.icon}</div>
                <div style={{color:'#E2E8F0',fontSize:13,fontWeight:600}}>{name}</div>
                <div style={{color:'#334155',fontSize:10,marginTop:2}}>{p.subtitle.split(' ').slice(0,3).join(' ')}...</div>
              </button>
            );})}
          </div>
          {hist.length>0&&(
            <div>
              <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Recent</div>
              {hist.slice(0,4).map(s=>{const p=PLAN[s.type];return(
                <div key={s.id} onClick={()=>setView(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#0D1B2E',border:'1px solid #1E2D40',borderRadius:10,marginBottom:7,cursor:'pointer'}}>
                  <div style={{width:34,height:34,borderRadius:7,background:p?.color+'22',border:`1px solid ${p?.color}44`,display:'flex',alignItems:'center',justifyContent:'center',color:p?.color,fontSize:15,fontFamily:'monospace',fontWeight:900,flexShrink:0}}>{p?.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:'#CBD5E1',fontSize:13,fontWeight:600}}>{s.type}</div>
                    <div style={{color:'#334155',fontSize:11}}>{fmt(s.session_date)} · Wk {s.week}</div>
                  </div>
                  <div style={{color:'#1E3A5F'}}>›</div>
                </div>
              );})}
            </div>
          )}
        </div>
      )}

      {/* EXERCISES */}
      {screen==='exercises'&&<ExerciseLibrary hist={hist}/>}

      {/* LOG */}
      {screen==='log'&&atype&&(
        <div style={{padding:'14px 20px 0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div>
              <div style={{color:col,fontSize:18,fontWeight:700}}>{atype}</div>
              <div style={{color:'#475569',fontSize:11}}>{plan?.subtitle}</div>
            </div>
            <button onClick={()=>{setScreen('home');setAtype(null);}} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:6,color:'#475569',padding:'4px 10px',cursor:'pointer',fontSize:12}}>Cancel</button>
          </div>
          {ig&&(
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,padding:'8px 12px',background:'#0A1628',border:'1px solid #1E3A5F',borderRadius:8}}>
              <span style={{color:'#475569',fontSize:12,flexShrink:0}}>⏱ Rest</span>
              <div style={{display:'flex',gap:5,flex:1,flexWrap:'wrap'}}>
                {ROPT.map(o=>(
                  <button key={o.v} onClick={()=>setRestDur(o.v)} style={{padding:'3px 9px',borderRadius:5,border:`1px solid ${restDur===o.v?A:'#1E3A5F'}`,background:restDur===o.v?A+'22':'transparent',color:restDur===o.v?A:'#475569',cursor:'pointer',fontSize:11,fontWeight:restDur===o.v?700:400}}>{o.l}</button>
                ))}
              </div>
            </div>
          )}
          {ig&&plan.sections.map((sec,si)=><SecBlock key={si} sec={sec} si={si} secData={gdata[si]||{}} restDur={restDur} hist={hist} sessionType={atype} onChange={hgc}/>)}
          {atype==='Bike'&&<BikeLogger data={cdata} onChange={setCdata} week={week}/>}
          {atype==='Swim'&&<SwimLogger data={cdata} onChange={setCdata} sphase={sphase} setSphase={setSphase}/>}
          {atype==='Run'&&<RunLogger data={cdata} onChange={setCdata} week={week}/>}
          <div style={{background:'#0A1628',border:'1px solid #1E3A5F',borderRadius:10,padding:'12px 14px',marginTop:4,marginBottom:14}}>
            <div style={{color:'#475569',fontSize:11,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Workout Notes</div>
            <textarea placeholder="How did the session feel overall?" value={wnotes} onChange={e=>setWnotes(e.target.value)} style={{width:'100%',background:'transparent',border:'none',color:'#CBD5E1',fontSize:13,outline:'none',resize:'vertical',minHeight:70,boxSizing:'border-box',lineHeight:1.5}}/>
          </div>
          <button onClick={finish} style={{width:'100%',marginBottom:16,padding:'14px',background:`linear-gradient(135deg,${col}44,${col}22)`,border:`1px solid ${col}88`,borderRadius:10,color:col,fontSize:14,fontWeight:700,cursor:'pointer'}}>Complete Session ✓</button>
        </div>
      )}

      {/* REVIEW */}
      {screen==='review'&&done2&&(
        <div style={{padding:'14px 20px 0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div>
              <div style={{color:rc,fontSize:18,fontWeight:700}}>{done2.type} — Done ✓</div>
              <div style={{color:'#475569',fontSize:11}}>{fmt(done2.session_date)} · Week {done2.week}</div>
            </div>
            <button onClick={()=>setScreen('home')} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:6,color:'#475569',padding:'4px 10px',cursor:'pointer',fontSize:12}}>Home</button>
          </div>
          {done2.data?.workoutNotes&&(
            <div style={{background:'#0D1B2E',border:'1px solid #1E3A5F',borderRadius:8,padding:'10px 12px',marginBottom:12}}>
              <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Your Notes</div>
              <div style={{color:'#CBD5E1',fontSize:13}}>{done2.data.workoutNotes}</div>
            </div>
          )}
          <RevPanel session={done2} hist={hist} color={rc}/>
        </div>
      )}

      {/* HISTORY */}
      {screen==='history'&&(
        <div style={{padding:'16px 20px 0'}}>
          <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1.5,marginBottom:10}}>All Sessions ({hist.length})</div>
          {hist.length===0&&<div style={{textAlign:'center',padding:'60px 0',color:'#1E3A5F'}}><div style={{fontSize:28,marginBottom:8}}>○</div><div style={{fontSize:13}}>No sessions yet</div></div>}
          {hist.map(s=>{const p=PLAN[s.type];return(
            <div key={s.id} onClick={()=>setView(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#0D1B2E',border:'1px solid #1E2D40',borderRadius:10,marginBottom:7,cursor:'pointer'}}>
              <div style={{width:34,height:34,borderRadius:7,background:p?.color+'22',border:`1px solid ${p?.color}44`,display:'flex',alignItems:'center',justifyContent:'center',color:p?.color,fontSize:15,fontFamily:'monospace',fontWeight:900,flexShrink:0}}>{p?.icon}</div>
              <div style={{flex:1}}><div style={{color:'#CBD5E1',fontSize:13,fontWeight:600}}>{s.type}</div><div style={{color:'#334155',fontSize:11}}>{fmt(s.session_date)} · Wk {s.week}</div></div>
              <div style={{color:'#1E3A5F'}}>›</div>
            </div>
          );})}
        </div>
      )}

      {/* SESSION DETAIL MODAL */}
      {view&&(
        <div style={{position:'fixed',inset:0,background:'#000000bb',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setView(null)}>
          <div style={{background:'#0A1628',border:`1px solid ${PLAN[view.type]?.color}44`,borderRadius:14,padding:20,maxWidth:460,width:'100%',maxHeight:'88vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{color:PLAN[view.type]?.color,fontSize:17,fontWeight:700}}>{view.type}</div>
                <div style={{color:'#475569',fontSize:12}}>{fmt(view.session_date)} — Week {view.week}</div>
              </div>
              <button onClick={()=>setView(null)} style={{background:'none',border:'none',color:'#475569',fontSize:22,cursor:'pointer'}}>×</button>
            </div>
            {view.data?.workoutNotes&&(
              <div style={{background:'#0D1B2E',border:'1px solid #1E3A5F',borderRadius:8,padding:'10px 12px',marginBottom:12}}>
                <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Workout Notes</div>
                <div style={{color:'#CBD5E1',fontSize:13}}>{view.data.workoutNotes}</div>
              </div>
            )}
            {['Gym A','Gym B','Gym C'].includes(view.type)&&view.data?.sections?.map((sec,si)=>(
              <div key={si} style={{marginBottom:12}}>
                <div style={{color:'#94A3B8',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:6,paddingBottom:4,borderBottom:'1px solid #1E2D40'}}>{sec.title}</div>
                {sec.supersets?.map((ss,ssi)=>(
                  <div key={ssi} style={{marginBottom:10}}>
                    <div style={{color:'#475569',fontSize:10,marginBottom:5}}>{ss.label}</div>
                    {ss.exercises?.map((ex,ei)=>{
                      const sets=ex.sets||[];if(!sets.some(s=>s.weight||s.reps))return null;
                      return(
                        <div key={ei} style={{marginBottom:6,padding:'8px 10px',background:'#0D1B2E',borderRadius:7}}>
                          <div style={{color:'#CBD5E1',fontSize:12,fontWeight:600,marginBottom:4}}>{ex.name}</div>
                          {sets.map((s,si2)=>(s.weight||s.reps)&&(
                            <div key={si2} style={{display:'flex',gap:8,fontSize:11,fontFamily:'monospace',color:'#475569',marginBottom:1}}>
                              <span>Set {si2+1}:</span>
                              <span style={{color:PLAN[view.type]?.color}}>{s.weight||'–'}kg</span>
                              <span>×</span>
                              <span style={{color:'#94A3B8'}}>{s.reps||'–'} reps</span>
                              {s.done&&<span style={{color:G}}>✓</span>}
                            </div>
                          ))}
                          {ex.rpe&&<div style={{marginTop:4,fontSize:11,color:'#475569'}}>RPE {ex.rpe}</div>}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            ))}
            {!['Gym A','Gym B','Gym C'].includes(view.type)&&view.data&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                {Object.entries(view.data).filter(([k])=>k!=='notes'&&k!=='workoutNotes'&&view.data[k]).map(([k,v])=>(
                  <div key={k} style={{background:'#0D1B2E',borderRadius:8,padding:'8px 10px'}}>
                    <div style={{color:'#475569',fontSize:10,textTransform:'capitalize'}}>{k.replace(/([A-Z])/g,' $1')}</div>
                    <div style={{color:PLAN[view.type]?.color,fontSize:14,fontFamily:'monospace',fontWeight:700}}>{v}</div>
                  </div>
                ))}
              </div>
            )}
            <RevPanel session={view} hist={hist} color={PLAN[view.type]?.color||A}/>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
