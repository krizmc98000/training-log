// ── 3-LAYER GIF CACHE ────────────────────────────────────────────────────────
// Layer 1: in-memory (instant, resets on page reload)
// Layer 2: Supabase exercise_gifs table (persists forever, shared across devices)
// Layer 3: ExerciseDB API (called at most ONCE per exercise, ever)
const memCache={};

async function fetchExerciseGif(exName){
  // Layer 1 — memory
  if(memCache[exName]!==undefined)return memCache[exName];

  // Layer 2 — Supabase persistent cache
  try{
    const res=await fetch(
      SB+'/rest/v1/exercise_gifs?exercise_name=eq.'+encodeURIComponent(exName)+'&select=gif_url&limit=1',
      {headers:{'apikey':SK,'Authorization':'Bearer '+SK}}
    );
    if(res.ok){
      const rows=await res.json();
      if(rows&&rows.length>0){
        const url=rows[0].gif_url||null;
        memCache[exName]=url;
        return url;
      }
    }
  }catch{}

  // Layer 3 — ExerciseDB API (first time only)
  const term=GIF_SEARCH[exName]||exName.toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
  let gifUrl=null;
  try{
    const apiRes=await fetch(
      'https://exercisedb.p.rapidapi.com/exercises/name/'+encodeURIComponent(term)+'?limit=1&offset=0',
      {headers:{'x-rapidapi-key':RAPID_KEY,'x-rapidapi-host':RAPID_HOST}}
    );
    if(apiRes.ok){
      const data=await apiRes.json();
      gifUrl=(data&&data[0]&&data[0].gifUrl)?data[0].gifUrl:null;
    }
  }catch{}

  // Persist to Supabase only on success — don't cache nulls so rate-limited exercises retry next time
  if(gifUrl){
    fetch(SB+'/rest/v1/exercise_gifs',{
      method:'POST',
      headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({exercise_name:exName,gif_url:gifUrl,fetched_at:new Date().toISOString()})
    }).catch(()=>{});
  }

  memCache[exName]=gifUrl;
  return gifUrl;
}

async function db(method,path,body){
  const res=await fetch(SB+'/rest/v1'+path,{method,headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:body?JSON.stringify(body):undefined});
  const t=await res.text();return t?JSON.parse(t):null;
}
function uid(){let id=localStorage.getItem('tl-uid');if(!id){id='chris-'+Math.random().toString(36).slice(2,10);localStorage.setItem('tl-uid',id);}return id;}
const fmt=iso=>new Date(iso).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
function calcWeek(sd){if(!sd)return 1;const diff=new Date()-new Date(sd);return Math.max(1,Math.min(12,Math.floor(diff/(1000*60*60*24*7))+1));}
function getPrevSession(hist,type){return hist.filter(s=>s.type===type)[0]||null;}
function getPrevExData(prev,secTitle,exName){
  if(!prev||!prev.data||!prev.data.sections)return null;
  for(const sec of prev.data.sections){if(sec.title===secTitle){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(ex.name===exName){const ds=(ex.sets||[]).filter(s=>s.weight||s.reps);if(ds.length)return ds;}}}}}
  return null;
}
function canProgress(hist,type,secTitle,exName,repsStr){
  const sessions=hist.filter(s=>s.type===type).slice(0,2);
  if(sessions.length<2)return false;
  const top=parseInt((repsStr||'').split('-').pop());
  if(isNaN(top))return false;
  return sessions.every(session=>{
    if(!session.data||!session.data.sections)return false;
    for(const sec of session.data.sections){if(sec.title===secTitle){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(ex.name===exName){const sets=ex.sets||[];return sets.length>0&&sets.every(s=>s.done&&parseInt(s.reps)>=top);}}}}}
    return false;
  });
}
function getPersonalBest(hist,exName){
  let best=null,bestDate=null;
  for(const session of hist){if(!session.data||!session.data.sections)continue;for(const sec of session.data.sections){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(ex.name===exName){for(const s of ex.sets||[]){const w=parseFloat(s.weight),r=parseInt(s.reps);if(w&&r&&s.done){if(!best||w>best.weight||(w===best.weight&&r>best.reps)){best={weight:w,reps:r};bestDate=session.session_date;}}}}}}}}
  return best?{...best,date:bestDate}:null;
}
function getLastLogged(hist,exName){
  for(const session of hist){if(!session.data||!session.data.sections)continue;for(const sec of session.data.sections){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(ex.name===exName){const ds=(ex.sets||[]).filter(s=>s.weight&&s.reps&&s.done);if(ds.length)return{date:session.session_date,sets:ds,sessionType:session.type,week:session.week};}}}}}
  return null;
}

function buildLibrary(){
  const lib=[],seen=new Set();
  for(const[sessionName,plan]of Object.entries(PLAN)){
    if(!plan.sections)continue;
    for(const sec of plan.sections){for(const ss of sec.supersets||[]){for(const ex of ss.exercises||[]){if(!seen.has(ex.name)){seen.add(ex.name);const c=COACHING[ex.name]||{};lib.push({name:ex.name,sets:ex.sets,reps:ex.reps,category:c.category||sec.title,muscle:c.muscle||'',sessions:[],tips:c.tips||[]});}const entry=lib.find(e=>e.name===ex.name);if(entry&&!entry.sessions.includes(sessionName))entry.sessions.push(sessionName);}}}
  }
  for(const ex of SWU_EX){if(!seen.has(ex.name)){seen.add(ex.name);const c=COACHING[ex.name]||{};lib.push({name:ex.name,sets:ex.sets,reps:ex.reps,category:'Swim Warm-Up',muscle:c.muscle||'',sessions:['Swim'],tips:c.tips||[]});}}
  // Add warm-up exercises from all three sessions
  const allWarmup=[...WARMUP_A,...WARMUP_B,...WARMUP_C];
  for(const ex of allWarmup){
    if(!seen.has(ex.name)){
      seen.add(ex.name);
      const c=WARMUP_COACHING[ex.name]||{};
      lib.push({name:ex.name,sets:ex.sets,reps:ex.reps,category:'Warm-Up',muscle:c.muscle||'',sessions:['Gym A','Gym B','Gym C'].filter((_,i)=>[WARMUP_A,WARMUP_B,WARMUP_C][i].some(w=>w.name===ex.name)),tips:c.tips||[]});
    }
  }
  return lib.sort((a,b)=>a.name.localeCompare(b.name));
}

// ── GIF COMPONENT ─────────────────────────────────────────────────────────────
function ExerciseGif({exName,color}){
  const[gifUrl,setGifUrl]=useState(null);
  const[loading,setLoading]=useState(true);
  const[failed,setFailed]=useState(false);
  useEffect(()=>{
    let cancelled=false;
    setLoading(true);setFailed(false);setGifUrl(null);
    fetchExerciseGif(exName).then(url=>{
      if(cancelled)return;
      if(url){setGifUrl(url);setLoading(false);}
      else{setFailed(true);setLoading(false);}
    });
    return()=>{cancelled=true;};
  },[exName]);
  if(loading)return <div className="shimmer" style={{width:'100%',height:180,borderRadius:12,marginBottom:14}}/>;
  if(failed||!gifUrl)return(
    <div style={{background:'#0D1B2E',border:`1px solid ${color}22`,borderRadius:10,padding:'12px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontSize:20}}>🎬</span>
      <div>
        <div style={{color:'#334155',fontSize:12}}>GIF unavailable</div>
        <div style={{color:'#1E3A5F',fontSize:10,marginTop:2}}>Check coaching notes below</div>
      </div>
    </div>
  );
  return(
    <div style={{borderRadius:12,overflow:'hidden',marginBottom:14,background:'#0D1B2E',border:`1px solid ${color}33`,position:'relative'}}>
      <img src={gifUrl} alt={exName} style={{width:'100%',display:'block',maxHeight:260,objectFit:'contain',background:'#0D1B2E'}} onError={()=>setFailed(true)}/>
      <div style={{position:'absolute',bottom:6,right:8,color:'#1E3A5F',fontSize:9}}>via ExerciseDB</div>
    </div>
  );
}

// Two-knock sound via Web Audio API — no external files
function playKnock(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.13].forEach(delay=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=520;
      gain.gain.setValueAtTime(0,ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+delay+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.22);
      osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+0.25);
    });
  }catch{}
}

// Timer uses Date.now() so it survives tab switching, phone lock, music app switches
function Timer({duration,onDone}){
  const endAt=useRef(Date.now()+duration*1000);
  const pauseLeft=useRef(null);
  const[rem,setRem]=useState(duration);
  const[active,setActive]=useState(true);

  // Tick every 250ms — catches up instantly when tab becomes visible
  useEffect(()=>{
    if(!active)return;
    const id=setInterval(()=>{
      const r=Math.max(0,Math.ceil((endAt.current-Date.now())/1000));
      setRem(r);
      if(r<=0){clearInterval(id);playKnock();onDone();}
    },250);
    return()=>clearInterval(id);
  },[active]);

  // Re-check immediately when tab/app regains focus
  useEffect(()=>{
    const onVisible=()=>{
      if(document.visibilityState==='visible'&&active){
        const r=Math.max(0,Math.ceil((endAt.current-Date.now())/1000));
        setRem(r);
        if(r<=0){playKnock();onDone();}
      }
    };
    document.addEventListener('visibilitychange',onVisible);
    return()=>document.removeEventListener('visibilitychange',onVisible);
  },[active]);

  const togglePause=()=>{
    if(active){pauseLeft.current=(endAt.current-Date.now());}
    else{endAt.current=Date.now()+(pauseLeft.current||0);}
    setActive(a=>!a);
  };
  const r=26,circ=2*Math.PI*r,c=rem>duration*0.5?G:rem>duration*0.25?O:R;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'14px 0',background:'#0A1628',borderRadius:12,border:`1px solid ${c}44`,margin:'10px 0'}}>
      <div style={{color:'#475569',fontSize:11,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Rest Timer</div>
      <div style={{position:'relative',width:66,height:66}}>
        <svg width="66" height="66" style={{transform:'rotate(-90deg)'}}><circle cx="33" cy="33" r={r} fill="none" stroke="#1E2D40" strokeWidth="5"/><circle cx="33" cy="33" r={r} fill="none" stroke={c} strokeWidth="5" strokeDasharray={`${circ*(rem/duration)} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray 0.3s linear,stroke 0.3s'}}/></svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:c,fontSize:18,fontFamily:'monospace',fontWeight:700}}>{rem}</span></div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:10}}>
        <button onClick={togglePause} style={{background:'none',border:`1px solid ${c}44`,borderRadius:6,color:c,padding:'4px 12px',cursor:'pointer',fontSize:12}}>{active?'Pause':'Resume'}</button>
        <button onClick={onDone} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:6,color:'#475569',padding:'4px 12px',cursor:'pointer',fontSize:12}}>Skip</button>
      </div>
    </div>
  );
}

function SSBlock({ss,ssData,onChange,color,restDur,secTitle,hist,sessionType}){
  const[col,setCol]=useState(false);const[timer,setTimer]=useState(false);const prev=useRef(0);
  const prevSession=getPrevSession(hist,sessionType);
  const tot=ss.exercises.reduce((a,ex)=>a+(ex.sets||1),0);
  const dn=ss.exercises.reduce((a,ex,ei)=>a+((ssData[ei]?ssData[ei].sets||[]:[]).filter(s=>s.done).length),0);
  // Auto-collapse when all sets in superset are done
  useEffect(()=>{if(dn===tot&&tot>0){setTimer(false);setCol(true);}},[dn,tot]);
  useEffect(()=>{
    if(ss.exercises.length<=1)return;
    const mins=ss.exercises.map((_,ei)=>(ssData[ei]?ssData[ei].sets||[]:[]).filter(s=>s.done).length);
    const m=Math.min(...mins);
    if(m>prev.current&&m>0&&!timer&&dn<tot)setTimer(true);
    prev.current=m;
  },[ssData]);
  return(
    <div style={{marginBottom:12}}>
      <button onClick={()=>setCol(v=>!v)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',background:`linear-gradient(135deg,${color}1A,${color}0A)`,border:`1px solid ${color}33`,borderRadius:10,padding:'9px 13px',cursor:'pointer',marginBottom:col?0:8}}>

      </button>

        <div style={{paddingLeft:4}}>

          })}
          {timer&&<Timer duration={restDur} onDone={()=>setTimer(false)}/>}
        </div>
      )}
    </div>
  );
}

// Claude API proxy — routes through Supabase edge function to avoid CORS/key issues on GitHub Pages
const PROXY_URL='https://gvzkxjynpmjnexbmhqgb.supabase.co/functions/v1/claude-proxy';
async function callClaude(system,messages,max_tokens=1000){
  const res=await fetch(PROXY_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK},
    body:JSON.stringify({system,messages,max_tokens})
  });
  if(!res.ok)throw new Error('API error '+res.status);
  const d=await res.json();
  if(d.error)throw new Error(d.error);
  return(d.content&&d.content[0]&&d.content[0].text)||'No response.';
}

function RevPanel({session,hist,color,onFeedback}){
  const[st,setSt]=useState('idle');const[fb,setFb]=useState('');
  const sum=s=>{
    const ig=['Gym A','Gym B','Gym C'].includes(s.type);
    let t=`Session: ${s.type} | Week: ${s.week}\n`;
    if(s.data&&s.data.workoutNotes)t+=`Notes: ${s.data.workoutNotes}\n`;
    t+='\n';const d=s.data||{};
    if(ig){(d.sections||[]).forEach(sec=>{t+=`[${sec.title}]\n`;(sec.supersets||[]).forEach(ss=>{t+=`${ss.label}:\n`;(ss.exercises||[]).forEach(ex=>{t+=`${ex.name}\n`;(ex.sets||[]).forEach((s2,i)=>{if(s2.weight||s2.reps)t+=`  Set ${i+1}: ${s2.weight||'?'}kg x ${s2.reps||'?'}${s2.done?' done':''}\n`;});if(ex.rpe)t+=`  RPE: ${ex.rpe}\n`;});});});}
    else if(s.type==='Run')t+=`Distance: ${d.distance||'?'}km | Duration: ${d.duration||'?'}min | Avg HR: ${d.avgHR||'?'}bpm\nPace: ${d.avgPace||'?'}/km | Zone: ${d.zone||'?'} | Feel: ${d.feel||'?'}\n`;
    else if(s.type==='Swim')t+=`Distance: ${d.distance||'?'}m | Duration: ${d.duration||'?'}min | Shoulder: ${d.shoulder||'?'}\n`;
    else if(s.type==='Bike')t+=`Duration: ${d.duration||'?'}min | Avg HR: ${d.avgHR||'?'}bpm | Zone: ${d.zone||'?'} | Legs: ${d.legs||'?'}\n`;
    return t;
  };
  const go=async()=>{
    setSt('loading');
    try{
      const s=sum(session);
      const prev=(hist||[]).filter(h=>h.type===session.type&&h.id!==session.id).slice(0,3);
      const pt=prev.length?'\nPREVIOUS SESSIONS:\n'+prev.map(sum).join('\n'):'';
      const system=`You are an expert personal trainer reviewing workout data for Chris, 35yo, 79.3kg, London. 12-week hypertrophy plan. Right shoulder surgery Nov 2024 — 20-45deg ROM deficit, no overhead pressing. Week ${session.week} of 12. Progression: hit top rep range on all sets across 2 consecutive sessions then increase weight (2.5kg upper, 5kg lower). Target RPE 6-8. Provide: 1) Brief overall assessment 2) Exercise highlights — flag weights to progress, RPE concerns 3) Shoulder check if gym session 4) One specific action for next session. Use exact weights. Under 350 words. Use **bold** headers.`;
      const text=await callClaude(system,[{role:'user',content:`SESSION:\n${s}${pt}`}]);
      setFb(text);setSt('done');
      if(onFeedback)onFeedback(`**Post-Session: ${session.type} (Week ${session.week})**\n\n${text}`);
    }catch(e){setFb('Error: '+e.message);setSt('error');}
  };
  const render=t=>t.split('\n').map((l,i)=>{
    if(!l.trim())return <div key={i} style={{height:6}}/>;
    const p=l.split(/\*\*(.*?)\*\*/g);
    return <div key={i} style={{marginBottom:4,lineHeight:1.6}}>{p.map((x,j)=>j%2===1?<span key={j} style={{color:'#E2E8F0',fontWeight:700,fontSize:13}}>{x}</span>:<span key={j} style={{color:'#94A3B8',fontSize:13}}>{x}</span>)}</div>;
  });
  return(
    <div style={{marginTop:16}}>
      {st==='idle'&&<button onClick={go} style={{width:'100%',padding:'13px',background:`linear-gradient(135deg,${color}44,${color}22)`,border:`1px solid ${color}`,borderRadius:10,color,fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><span>🤖</span> Get Claude Feedback</button>}
      {st==='loading'&&<div style={{background:'#0D1B2E',border:`1px solid ${color}44`,borderRadius:10,padding:'20px',textAlign:'center'}}><div style={{color,fontSize:13,marginBottom:10}}>Analysing your session...</div><div style={{display:'flex',justifyContent:'center',gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:color,animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}</div></div>}
      {(st==='done'||st==='error')&&<div style={{background:'#0D1B2E',border:`1px solid ${color}44`,borderRadius:10,padding:'16px'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,paddingBottom:10,borderBottom:'1px solid #1E2D40'}}><span style={{color,fontSize:13,fontWeight:700}}>Claude Feedback</span><button onClick={()=>setSt('idle')} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:4,color:'#475569',padding:'3px 8px',cursor:'pointer',fontSize:11}}>Refresh</button></div>{render(fb)}</div>}
    </div>
  );

                <div style={{color:startDate?'#1E3A5F':O,fontSize:8,fontWeight:startDate?400:700}}>{startDate?'auto':'tap to set!'}</div>
              </button>
              <button onClick={()=>setWeek(w=>Math.min(12,w+1))} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:4,color:'#475569',width:24,height:24,cursor:'pointer',fontSize:16}}>›</button>
            </div>
          </div>
        </div>
        {showDP&&(
          <div style={{background:'#0D1B2E',border:`1px solid ${A}33`,borderRadius:10,padding:'12px 14px',marginTop:10}}>
            <div style={{color:'#94A3B8',fontSize:12,marginBottom:8}}>Set plan start date — week auto-calculates</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input type="date" value={startDate} onChange={e=>applyStart(e.target.value)} style={{flex:1,background:'#070E1A',border:'1px solid #1E3A5F',borderRadius:6,color:A,padding:'7px 10px',fontSize:13,outline:'none'}}/>
              <button onClick={()=>setShowDP(false)} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:6,color:'#475569',padding:'7px 12px',cursor:'pointer',fontSize:12}}>Done</button>
            </div>
            {startDate&&<div style={{color:'#475569',fontSize:11,marginTop:6}}>Currently Week {calcWeek(startDate)} of 12</div>}
          </div>
        )}
        <div style={{display:'flex',marginTop:12,borderBottom:'1px solid #1E2D40',overflowX:'auto'}}>
          {/* Sessions tab — never kills live session */}
          <button onClick={()=>setScreen('home')} style={{flex:1,padding:'8px 0',background:'none',border:'none',color:navScreen==='home'?A:'#475569',fontSize:12,fontWeight:navScreen==='home'?600:400,cursor:'pointer',borderBottom:navScreen==='home'?`2px solid ${A}`:'2px solid transparent',textAlign:'center',whiteSpace:'nowrap'}}>Sessions</button>
          {/* LIVE tab — only visible when a session is active */}
          {atype&&(
            <button onClick={()=>setScreen('log')} style={{flex:1,padding:'8px 0',background:'none',border:'none',color:navScreen==='live'?O:'#FB923C88',fontSize:12,fontWeight:700,cursor:'pointer',borderBottom:navScreen==='live'?`2px solid ${O}`:'2px solid transparent',textAlign:'center',whiteSpace:'nowrap',position:'relative'}}>
              <span style={{marginRight:4}}>⬤</span>Live
              {saving&&<span style={{color:'#334155',fontSize:9,position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)'}}>saving</span>}
            </button>
          )}
          <button onClick={()=>setScreen('exercises')} style={{flex:1,padding:'8px 0',background:'none',border:'none',color:navScreen==='exercises'?A:'#475569',fontSize:12,fontWeight:navScreen==='exercises'?600:400,cursor:'pointer',borderBottom:navScreen==='exercises'?`2px solid ${A}`:'2px solid transparent',textAlign:'center',whiteSpace:'nowrap'}}>Exercises</button>
          <button onClick={()=>setScreen('history')} style={{flex:1,padding:'8px 0',background:'none',border:'none',color:navScreen==='history'?A:'#475569',fontSize:12,fontWeight:navScreen==='history'?600:400,cursor:'pointer',borderBottom:navScreen==='history'?`2px solid ${A}`:'2px solid transparent',textAlign:'center',whiteSpace:'nowrap'}}>History</button>
          <button onClick={()=>setScreen('claudept')} style={{flex:1,padding:'8px 0',background:'none',border:'none',color:navScreen==='claudept'?PU:'#475569',fontSize:12,fontWeight:navScreen==='claudept'?600:400,cursor:'pointer',borderBottom:navScreen==='claudept'?`2px solid ${PU}`:'2px solid transparent',textAlign:'center',whiteSpace:'nowrap'}}>Claude PT</button>
        </div>
      </div>

      {/* HOME */}
      {screen==='home'&&(
        <div style={{padding:'16px 20px 0'}}>
          <div style={{marginBottom:16}}>
            <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Week {week} Progress</div>
            <div style={{display:'flex',gap:5}}>
              {DAYS.map(day=>{const exp=DMAP[day],dn=dtw.includes(exp),rest=exp==='Rest';return(
                <div key={day} style={{flex:1,textAlign:'center'}}>
                  <div style={{fontSize:9,color:'#334155',marginBottom:3,fontFamily:'monospace'}}>{day}</div>
                  <div style={{height:30,borderRadius:6,background:rest?'#0D1B2E':dn?G+'33':'#0D1B2E',border:`1px solid ${rest?'#1E2D40':dn?G+'88':'#1E3A5F'}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:9,color:rest?'#1E3A5F':dn?G:'#334155',fontWeight:600}}>{rest?'–':dn?'✓':exp.replace('Gym ','')}</span>
                  </div>
                </div>
              );})}
            </div>
          </div>
          <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1.5,marginBottom:10}}>Start Session</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            {Object.entries(PLAN).map(([name,p])=>{const dn=dtw.includes(name);return(
              <button key={name} onClick={()=>startSess(name)} style={{padding:'14px 12px',background:'#0A1628',border:`1px solid ${dn?p.color+'88':p.color+'44'}`,borderRadius:12,cursor:'pointer',textAlign:'left',position:'relative',overflow:'hidden'}}>
                {dn&&<div style={{position:'absolute',top:8,right:8,width:7,height:7,background:G,borderRadius:'50%'}}/>}
                <div style={{fontSize:20,fontFamily:'monospace',fontWeight:900,color:p.color,marginBottom:3,lineHeight:1}}>{p.icon}</div>
                <div style={{color:'#E2E8F0',fontSize:13,fontWeight:600}}>{name}</div>
                <div style={{color:'#334155',fontSize:10,marginTop:2}}>{p.subtitle.split(' ').slice(0,3).join(' ')}...</div>
              </button>
            );})}
          </div>
          {hist.length>0&&(
            <div>
              <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Recent</div>
              {hist.slice(0,4).map(s=>{const p=PLAN[s.type];return(
                <div key={s.id} onClick={()=>setView(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#0D1B2E',border:'1px solid #1E2D40',borderRadius:10,marginBottom:7,cursor:'pointer'}}>
                  <div style={{width:34,height:34,borderRadius:7,background:p?p.color+'22':'#1E2D40',border:`1px solid ${p?p.color+'44':'#1E2D40'}`,display:'flex',alignItems:'center',justifyContent:'center',color:p?p.color:A,fontSize:15,fontFamily:'monospace',fontWeight:900,flexShrink:0}}>{p?p.icon:'?'}</div>
                  <div style={{flex:1,minWidth:0}}><div style={{color:'#CBD5E1',fontSize:13,fontWeight:600}}>{s.type}</div><div style={{color:'#334155',fontSize:11}}>{fmt(s.session_date)} · Wk {s.week}</div></div>
                  <div style={{color:'#1E3A5F'}}>›</div>
                </div>
              );})}
            </div>
          )}
        </div>
      )}

      {screen==='exercises'&&<ExerciseLibrary hist={hist}/>}

      {/* LOG */}
      {screen==='log'&&atype&&(
        <div style={{padding:'14px 20px 0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div><div style={{color:col,fontSize:18,fontWeight:700}}>{atype}</div><div style={{color:'#475569',fontSize:11}}>{plan?plan.subtitle:''}</div></div>
            <button onClick={()=>{setScreen('home');setAtype(null);}} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:6,color:'#475569',padding:'4px 10px',cursor:'pointer',fontSize:12}}>Cancel</button>
          </div>
          {/* Session date picker — defaults to today, can backdate */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,padding:'8px 12px',background:'#0A1628',border:'1px solid #1E3A5F',borderRadius:8}}>
            <span style={{color:'#475569',fontSize:11,flexShrink:0}}>📅 Date</span>
            <input type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)}
              style={{flex:1,background:'transparent',border:'none',color:col,fontSize:13,fontFamily:'monospace',fontWeight:600,outline:'none'}}/>
            {sessionDate!==new Date().toISOString().slice(0,10)&&(
              <span style={{color:O,fontSize:10,fontWeight:600,flexShrink:0}}>backdated</span>
            )}
          </div>
          {ig&&(
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,padding:'8px 12px',background:'#0A1628',border:'1px solid #1E3A5F',borderRadius:8}}>
              <span style={{color:'#475569',fontSize:12,flexShrink:0}}>⏱ Rest</span>
              <div style={{display:'flex',gap:5,flex:1,flexWrap:'wrap'}}>
                {ROPT.map(o=><button key={o.v} onClick={()=>setRestDur(o.v)} style={{padding:'3px 9px',borderRadius:5,border:`1px solid ${restDur===o.v?A:'#1E3A5F'}`,background:restDur===o.v?A+'22':'transparent',color:restDur===o.v?A:'#475569',cursor:'pointer',fontSize:11,fontWeight:restDur===o.v?700:400}}>{o.l}</button>)}
              </div>
            </div>
          )}
          {ig&&plan.sections.map((sec,si)=><SecBlock key={si} sec={sec} si={si} secData={gdata[si]||{}} restDur={restDur} hist={hist} sessionType={atype} onChange={hgc}/>)}
          {atype==='Bike'&&<BikeLogger data={cdata} onChange={setCdata} week={week}/>}
          {atype==='Swim'&&<SwimLogger data={cdata} onChange={setCdata} sphase={sphase} setSphase={setSphase}/>}
          {atype==='Run'&&<RunLogger data={cdata} onChange={setCdata} week={week}/>}
          <div style={{background:'#0A1628',border:'1px solid #1E3A5F',borderRadius:10,padding:'12px 14px',marginTop:4,marginBottom:14}}>
            <div style={{color:'#475569',fontSize:11,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Workout Notes</div>
            <textarea placeholder="How did the session feel overall?" value={wnotes} onChange={e=>setWnotes(e.target.value)} style={{width:'100%',background:'transparent',border:'none',color:'#CBD5E1',fontSize:13,outline:'none',resize:'vertical',minHeight:70,boxSizing:'border-box',lineHeight:1.5}}/>
          </div>
          <button onClick={finish} style={{width:'100%',marginBottom:16,padding:'14px',background:`linear-gradient(135deg,${col}44,${col}22)`,border:`1px solid ${col}88`,borderRadius:10,color:col,fontSize:14,fontWeight:700,cursor:'pointer'}}>Complete Session ✓</button>
        </div>
      )}

      {/* REVIEW */}
      {screen==='review'&&done2&&(
        <div style={{padding:'14px 20px 0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div><div style={{color:rc,fontSize:18,fontWeight:700}}>{done2.type} — Done ✓</div><div style={{color:'#475569',fontSize:11}}>{fmt(done2.session_date)} · Week {done2.week}</div></div>
            <button onClick={()=>setScreen('home')} style={{background:'none',border:'1px solid #1E3A5F',borderRadius:6,color:'#475569',padding:'4px 10px',cursor:'pointer',fontSize:12}}>Home</button>
          </div>
          {done2.data&&done2.data.workoutNotes&&<div style={{background:'#0D1B2E',border:'1px solid #1E3A5F',borderRadius:8,padding:'10px 12px',marginBottom:12}}><div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Your Notes</div><div style={{color:'#CBD5E1',fontSize:13}}>{done2.data.workoutNotes}</div></div>}
          <RevPanel session={done2} hist={hist} color={rc} onFeedback={addPtFeedback}/>
        </div>
      )}

      {/* HISTORY */}
      {screen==='history'&&(
        <div style={{padding:'16px 20px 0'}}>
          <div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1.5,marginBottom:10}}>All Sessions ({hist.length})</div>
          {hist.length===0&&<div style={{textAlign:'center',padding:'60px 0',color:'#1E3A5F'}}><div style={{fontSize:28,marginBottom:8}}>○</div><div style={{fontSize:13}}>No sessions yet</div></div>}
          {hist.map(s=>{const p=PLAN[s.type];return(
            <div key={s.id} onClick={()=>setView(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#0D1B2E',border:'1px solid #1E2D40',borderRadius:10,marginBottom:7,cursor:'pointer'}}>
              <div style={{width:34,height:34,borderRadius:7,background:p?p.color+'22':'#1E2D40',border:`1px solid ${p?p.color+'44':'#1E2D40'}`,display:'flex',alignItems:'center',justifyContent:'center',color:p?p.color:A,fontSize:15,fontFamily:'monospace',fontWeight:900,flexShrink:0}}>{p?p.icon:'?'}</div>
              <div style={{flex:1}}><div style={{color:'#CBD5E1',fontSize:13,fontWeight:600}}>{s.type}</div><div style={{color:'#334155',fontSize:11}}>{fmt(s.session_date)} · Wk {s.week}</div></div>
              <div style={{color:'#1E3A5F'}}>›</div>
            </div>
          );})}
        </div>
      )}

      {/* CLAUDE PT */}
      {screen==='claudept'&&(
        <ClaudePT messages={ptMessages} setMessages={setPtMessages}/>
      )}

      {/* SESSION DETAIL MODAL */}
      {view&&(
        <div style={{position:'fixed',inset:0,background:'#000000bb',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setView(null)}>
          <div style={{background:'#0A1628',border:`1px solid ${PLAN[view.type]?PLAN[view.type].color:'#334155'}44`,borderRadius:14,padding:20,maxWidth:460,width:'100%',maxHeight:'88vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div><div style={{color:PLAN[view.type]?PLAN[view.type].color:A,fontSize:17,fontWeight:700}}>{view.type}</div><div style={{color:'#475569',fontSize:12}}>{fmt(view.session_date)} — Week {view.week}</div></div>
              <button onClick={()=>setView(null)} style={{background:'none',border:'none',color:'#475569',fontSize:22,cursor:'pointer'}}>×</button>
            </div>
            {view.data&&view.data.workoutNotes&&<div style={{background:'#0D1B2E',border:'1px solid #1E3A5F',borderRadius:8,padding:'10px 12px',marginBottom:12}}><div style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Workout Notes</div><div style={{color:'#CBD5E1',fontSize:13}}>{view.data.workoutNotes}</div></div>}
            {['Gym A','Gym B','Gym C'].includes(view.type)&&view.data&&view.data.sections&&view.data.sections.map((sec,si)=>(
              <div key={si} style={{marginBottom:12}}>
                <div style={{color:'#94A3B8',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:6,paddingBottom:4,borderBottom:'1px solid #1E2D40'}}>{sec.title}</div>
                {(sec.supersets||[]).map((ss,ssi)=>(
                  <div key={ssi} style={{marginBottom:10}}>
                    <div style={{color:'#475569',fontSize:10,marginBottom:5}}>{ss.label}</div>
                    {(ss.exercises||[]).map((ex,ei)=>{
                      const sets=ex.sets||[];if(!sets.some(s=>s.weight||s.reps))return null;
                      const vc=PLAN[view.type]?PLAN[view.type].color:A;
                      return <div key={ei} style={{marginBottom:6,padding:'8px 10px',background:'#0D1B2E',borderRadius:7}}><div style={{color:'#CBD5E1',fontSize:12,fontWeight:600,marginBottom:4}}>{ex.name}</div>{sets.map((s,si2)=>(s.weight||s.reps)&&<div key={si2} style={{display:'flex',gap:8,fontSize:11,fontFamily:'monospace',color:'#475569',marginBottom:1}}><span>Set {si2+1}:</span><span style={{color:vc}}>{s.weight||'–'}kg</span><span>×</span><span style={{color:'#94A3B8'}}>{s.reps||'–'} reps</span>{s.done&&<span style={{color:G}}>✓</span>}</div>)}{ex.rpe&&<div style={{marginTop:4,fontSize:11,color:'#475569'}}>RPE {ex.rpe}</div>}</div>;
                    })}
                  </div>
                ))}
              </div>
            ))}
            {!['Gym A','Gym B','Gym C'].includes(view.type)&&view.data&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                {Object.entries(view.data).filter(([k])=>k!=='notes'&&k!=='workoutNotes'&&view.data[k]).map(([k,v])=>{const vc=PLAN[view.type]?PLAN[view.type].color:A;return <div key={k} style={{background:'#0D1B2E',borderRadius:8,padding:'8px 10px'}}><div style={{color:'#475569',fontSize:10,textTransform:'capitalize'}}>{k.replace(/([A-Z])/g,' $1')}</div><div style={{color:vc,fontSize:14,fontFamily:'monospace',fontWeight:700}}>{v}</div></div>;})}
              </div>
            )}
            <RevPanel session={view} hist={hist} color={PLAN[view.type]?PLAN[view.type].color:A} onFeedback={addPtFeedback}/>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
